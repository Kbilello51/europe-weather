name: Update Weather Dashboard

on:
  schedule:
    - cron: '0 */6 * * *'   # every 6 hours — matches ECMWF model update cycle
  workflow_dispatch:          # allow manual trigger from GitHub UI

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install dependencies
        run: |
          pip install openmeteo-requests requests-cache retry-requests numpy tqdm
          pip install "pandas==2.2.3"

      - name: Update weather data
        run: python update_europe_weather.py

      - name: Regenerate dashboard
        run: python generate_dashboard.py

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/ index.html
          git diff --staged --quiet || git commit -m "auto-update: $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
